service: demo-project

provider: 
  name: aws
  runtime: dotnet8
  region: ap-south-1
  memorySize: 512
  timeout: 30

  vpc:
    securityGroupIds:
      - sg-0fae0b4067744f26a
    subnetIds:
      - subnet-0d1cbb6674856b351
      - subnet-0ba92b13c578ff7dc

  environment:
    CONNECTION_STRING: "Host=demodb.cbym6qeguqg4.ap-south-1.rds.amazonaws.com;Port=5432;Database=postgres;Username=demo_admin;Password=Demo#1234"

  iamRoleStatements:
    - Effect: Allow
      Action: 
        - ec2:*
        - logs:*
      Resource: "*"

functions:
  demo-project-lambda-sls:
    handler: TaskApi 
    events: 
      - http:
          path: /{proxy+}
          method: ANY
          cors: true
      - http:
          path: /
          method: ANY
          cors: true

