service: demo-project

provider: 
  name: aws
  runtime: dotnet8
  region: ap-south-1
  versionFunctions: false

functions:
  demo-project-lambda-sls:
    handler: TaskApi 
    memorySize: 512
    timeout: 30
    events: 
      - http:
          path: /{proxy+}
          method: ANY
          cors: true
      - http:
          path: /
          method: ANY
          cors: true
    vpc: 
      securityGroupIds:
        - ${cf:dummy-project-cf:SlsLambdaSecurityGroup}
      subnetIds:
        - ${cf:dummy-project-cf:SlsPrivateSubnet1}
        - ${cf:dummy-project-cf:SlsPrivateSubnet2}
    environment:
      CONNECTION_STRING: ${ssm:/aws/reference/secretsmanager/dummy-project/connection-string}  
    iam:
      role:
        statements:
          - Effect: Allow
            Action:
              - logs:*
              - ec2:*
              - ssm:*
              - kms:Decrypt    
            Resource: "*"



