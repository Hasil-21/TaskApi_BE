AWSTemplateFormatVersion: 2010-09-09

Parameters:
  SubnetId: 
    Type: String

Resources:
  NatEip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref SubnetId

Outputs:
  NatGatewayId:
    Value: !Ref NatGateway

  NatEipAllocationId:
    Value: !GetAtt NatEip.AllocationId