version: 0.2
phases:
  install:
    runtime-versions:
      dotnet: 8.0
    commands:
      - dotnet tool install -g Amazon.Lambda.Tools
      - export PATH="$PATH:/root/.dotnet/tools"
  build:
    commands:
      - dotnet restore TaskApi.csproj
      - dotnet lambda package --configuration Release --output-package bin/Release/net8.0/TaskApi.zip
artifacts:
  files:
    - TaskApi/bin/Release/net8.0/TaskApi.zip
    - serverless.yml
    - buildspec-migration.yml
    - buildspec-deploy.yml
  discard-paths: no