version: 0.2

env:
  variables:
    CONNECTION_STRING: ""

phases:
  install:
    runtime-versions:
      dotnet: 8.0

  pre_build:
    commands:
      - echo "Restoring packages..."
      - dotnet restore TaskApi.csproj

  build:
    commands:
      - echo "Building..."
      - dotnet build TaskApi.csproj --configuration Release --no-restore

  post_build:
    commands:
      - echo "Publishing..."
      - dotnet publish TaskApi.csproj
          --configuration Release
          --runtime linux-x64
          --self-contained false
          --output ./publish

      - echo "Zipping..."
      - cd publish && zip -r ../lambda.zip . && cd ..

      - echo "Deploying to Lambda..."
      - aws lambda update-function-code
          --function-name demo-project-lambda
          --zip-file fileb://lambda.zip
          --region ap-south-1

artifacts:
  files:
    - lambda.zip
  discard-paths: yes